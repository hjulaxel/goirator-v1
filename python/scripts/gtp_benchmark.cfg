# GTP config for benchmarking goirator models vs alpha-beta
# Stripped-down config: no pondering, no resignation, moderate search.

logDir = benchmark_logs
logAllGTPCommunication = false
logSearchInfo = false
logToStderr = false

# Rules (goirator fork handles Go-captures + 5-in-a-row internally)
koRule = SIMPLE
scoringRule = AREA
taxRule = NONE
multiStoneSuicideLegal = false

defaultBoardSize = 15

# Search — moderate visits for reasonable play without burning time
maxVisits = 200
numSearchThreads = 2
ponderingEnabled = false

# Disable resignation so games always play to completion
allowResignation = false

# GPU
nnCacheSizePowerOfTwo = 18
nnMutexPoolSizePowerOfTwo = 16
nnRandomize = true
useFP16 = auto
useNHWC = auto
